version: "3.9"

services:
  # ---- Infrastructure ----
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sec_filings
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sec_filings"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Application services ----
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "scheduler.cron"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/sec_filings
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "src.queue.worker"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/sec_filings
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uvicorn", "src.api.server:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/sec_filings
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
